max_epochs: 20

# optimizer
lr: 3.0e-4 # base learning rate
weight_decay: 1.0e-2
beta1: 0.9
beta2: 0.999

# learning rate scheduler
warmup: # linear warmup
  frac_steps: 0.05 # 5% of total steps
  start_factor: 0.1 # start with 10% of the base learning rate

annealing: # cosine annealing
  eta_min_factor: 0.01 # minimum learning rate is 1% of the base learning rate

max_grad_norm: 1

pos_weight: 150.0
